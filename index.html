<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифра PRO | Калькулятор наклеек</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-wrapper">

    <!-- КАЛЬКУЛЯТОР -->
    <div class="calc-container">

        <h1>Калькулятор наклеек</h1>

        <p class="subtitle">
            ЦИФРА
        </p>

        <!-- МАТЕРИАЛ -->
        <div class="input-box">

            <label>Материал</label>

            <select
                id="material"
                onchange="calculate()"
            >
                <option value="paper">
                    Бумажная самоклейка
                </option>

                <option value="film">
                    Белая матовая плёнка
                </option>
            </select>

        </div>

        <!-- РАЗМЕР -->
        <div class="row">

            <div class="input-box">

                <label>Ширина (мм)</label>

                <input
                    type="number"
                    id="stickW"
                    value="30"
                    min="1"
                    oninput="calculate()"
                >

            </div>

            <div class="input-box">

                <label>Высота (мм)</label>

                <input
                    type="number"
                    id="stickH"
                    value="30"
                    min="1"
                    oninput="calculate()"
                >

            </div>

        </div>

        <!-- ТИРАЖ -->
        <div class="input-box">

            <label>Тираж (шт)</label>

            <input
                type="number"
                id="orderQty"
                value="1000"
                min="1"
                oninput="calculate()"
            >

        </div>

        <!-- КОЛИЧЕСТВО ВИДОВ -->
        <div class="input-box">

            <label>Количество видов</label>

            <input
                type="number"
                id="kinds"
                value="1"
                min="1"
                oninput="calculate()"
            >

        </div>

        <!-- КНОПКА -->
        <button
            id="copyBtn"
            class="copy-btn"
            type="button"
            onclick="copyTZ()"
        >
            Копировать ТЗ
        </button>

        <!-- РЕЗУЛЬТАТ -->
        <div class="result-card">

            <div
                class="price-value"
                id="finalPrice"
            >
                0 ₽
            </div>

            <div
                id="info"
                class="info-grid"
            >
            </div>

        </div>

    </div>

    <!-- ВИЗУАЛ -->
    <div class="visual-container">

        <div class="visual-title">
            Схема вёрстки листа
        </div>

        <canvas id="sheetCanvas"></canvas>

        <div class="legend">

            Синий контур — полезная область листа
            <br>

            Между наклейками:
            <b>4 мм</b>

            <br>

            Автоповорот:
            <b>90°</b>

        </div>

    </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
